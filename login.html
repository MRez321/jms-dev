<script>
  activeNav("");

  $(document).ready(function () {
      setAjaxCSRFToken();

      $('textarea').attr('rows', 5);

      if ($('.tooltip')[0]) {
          $('.tooltip').tooltip();
      }

      $.fn.select2.defaults.set('language', getUserLang());

      var md = window.markdownit({
        html: false,
        linkify: true,
        typographer: true,
        breaks: true
      });

      const markdownContent = ``.replace(/\r\n?/g, '\n').trim();;
      const markdownRef = document.getElementById('markdown-output');

      if (markdownRef && markdownContent) {
          const renderedContent = md.render(markdownContent.trim());

          markdownRef.innerHTML = renderedContent;
          markdownRef.querySelectorAll('a').forEach(link => {
              link.setAttribute('target', '_blank');
              link.setAttribute('rel', 'noopener noreferrer');
          });
      }
  });
</script>

<script>
    function doLogin() {
        //公钥加密
        var password = $('#password').val(); //明文密码
        var passwordEncrypted = encryptPassword(password)
        $('#password-hidden').val(passwordEncrypted); //返回给密码输入input
        $('#login-form').submit(); //post提交
    }

    function checkHealth() {
        let url = "/api/health/";
        requestApi({
            url: url,
            method: "GET",
            flash_message: false,
        })
    }

    setInterval(checkHealth, 30 * 1000);
</script>
