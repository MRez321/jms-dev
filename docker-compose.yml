name: jms

services:
  redis:
    image: redis:7.0
    container_name: jms_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks: [net]

  mariadb:
    image: mariadb:10.6
    container_name: jms_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: PleaseChangeMe
      MYSQL_DATABASE: jumpserver
      MYSQL_USER: jumpserver
      MYSQL_PASSWORD: PleaseChangeMe
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks: [net]

  core:
    image: jumpserver/core:v4.10.16-ce
    container_name: jms_core
    restart: unless-stopped
    environment:
      SECRET_KEY: PleaseChangeMe1234567890abcdefgh
      BOOTSTRAP_TOKEN: PleaseChangeMe
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: jumpserver
      DB_PASSWORD: PleaseChangeMe
      DB_NAME: jumpserver
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8080"
    volumes:
      - ./data/core:/opt/jumpserver/data
    depends_on: [mariadb, redis]
    networks: [net]

  celery:
    image: jumpserver/core:v4.10.16-ce
    container_name: jms_celery
    restart: unless-stopped
    command: start task
    environment:
      SECRET_KEY: PleaseChangeMe1234567890abcdefgh
      BOOTSTRAP_TOKEN: PleaseChangeMe
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: jumpserver
      DB_PASSWORD: PleaseChangeMe
      DB_NAME: jumpserver
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./data/core:/opt/jumpserver/data
    depends_on: [core]
    networks: [net]

  koko:
    image: jumpserver/koko:v4.10.16-ce
    container_name: jms_koko
    restart: unless-stopped
    privileged: true
    environment:
      CORE_HOST: http://core:8080
      BOOTSTRAP_TOKEN: PleaseChangeMe
    depends_on: [core]
    networks: [net]

  lion:
    image: jumpserver/lion:v4.10.16-ce
    container_name: jms_lion
    restart: unless-stopped
    environment:
      CORE_HOST: http://core:8080
      BOOTSTRAP_TOKEN: PleaseChangeMe
    depends_on: [core]
    networks: [net]

  chen:
    image: jumpserver/chen:v4.10.16-ce
    container_name: jms_chen
    restart: unless-stopped
    environment:
      CORE_HOST: http://core:8080
      BOOTSTRAP_TOKEN: PleaseChangeMe
    depends_on: [core]
    networks: [net]

  web:
    image: jumpserver/web:v4.10.16-ce
    container_name: jms_web
    restart: unless-stopped
    environment:
      CORE_HOST: http://core:8080
      KOKO_HOST: http://koko:5000
      LION_HOST: http://lion:8080
      CHEN_HOST: http://chen:8082
    ports:
      - "8080:80"
    volumes:
      - ./data/core:/opt/jumpserver/data
    depends_on: [core, koko, lion, chen]
    networks: [net]

networks:
  net:
    name: jms_net